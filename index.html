<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CFI Navbar</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header class="site-header">
			<nav class="navbar" aria-label="Primary">
				<a class="brand" href="#" aria-label="CFI Home">
					<img class="brand-logo" src="download.png" alt="CFI" />
				</a>

				<button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-links">
					<span class="sr-only">Toggle navigation</span>
					<span class="bar"></span>
					<span class="bar"></span>
					<span class="bar"></span>
				</button>

				<div class="nav-links" id="nav-links">
					<a href="#">Certifications</a>
					<a href="#">Courses</a>
					<a href="#">Resources</a>
					<a href="#">About</a>
					<a href="#">Pricing</a>
					<a href="#">Teams</a>
				</div>

				<div class="nav-actions">
					<label class="search" aria-label="Search">
						<span class="search-icon" aria-hidden="true">&#128269;</span>
						<input type="search" placeholder="Search" />
					</label>
					<a class="link" href="#">Log In</a>
					<a class="btn" href="#">Start Free</a>
				</div>
			</nav>
		</header>

		<script src="app.js"></script>
	</body>
</html>
